naftiko: 1.0.0-alpha2
info:
  label: Grapes Finance API — Contacts
  description: 'Grapes Finance API — Contacts. 2 operations. Lead operation: List contacts. Self-contained Naftiko capability
    covering one Grapes Finance business surface.'
  tags:
  - Grapes Finance
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAPES_FINANCE_API_KEY: GRAPES_FINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: grapes-finance-contacts
    baseUri: https://api.demo.grapesfinance.com
    description: Grapes Finance API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: get
        method: GET
        description: List contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.GRAPES_FINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: grapes-finance-contacts-rest
    port: 8080
    description: REST adapter for Grapes Finance API — Contacts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: get
        description: List contacts
        call: grapes-finance-contacts.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create contact
        call: grapes-finance-contacts.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grapes-finance-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Grapes Finance API — Contacts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-contacts
      description: List contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-finance-contacts.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contact
      description: Create contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: grapes-finance-contacts.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
