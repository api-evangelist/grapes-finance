naftiko: 1.0.0-alpha2
info:
  label: Grapes Finance API — Orders
  description: 'Grapes Finance API — Orders. 2 operations. Lead operation: List orders. Self-contained Naftiko capability
    covering one Grapes Finance business surface.'
  tags:
  - Grapes Finance
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAPES_FINANCE_API_KEY: GRAPES_FINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: grapes-finance-orders
    baseUri: https://api.demo.grapesfinance.com
    description: Grapes Finance API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: get
        method: GET
        description: List orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.GRAPES_FINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: grapes-finance-orders-rest
    port: 8080
    description: REST adapter for Grapes Finance API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: get
        description: List orders
        call: grapes-finance-orders.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create order
        call: grapes-finance-orders.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grapes-finance-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Grapes Finance API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-orders
      description: List orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-finance-orders.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-order
      description: Create order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: grapes-finance-orders.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
