naftiko: 1.0.0-alpha2
info:
  label: Grapes Finance API — Wallets
  description: 'Grapes Finance API — Wallets. 2 operations. Lead operation: List wallets. Self-contained Naftiko capability
    covering one Grapes Finance business surface.'
  tags:
  - Grapes Finance
  - Wallets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAPES_FINANCE_API_KEY: GRAPES_FINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: grapes-finance-wallets
    baseUri: https://api.demo.grapesfinance.com
    description: Grapes Finance API — Wallets business capability. Self-contained, no shared references.
    resources:
    - name: wallets
      path: /wallets
      operations:
      - name: get
        method: GET
        description: List wallets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create wallet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.GRAPES_FINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: grapes-finance-wallets-rest
    port: 8080
    description: REST adapter for Grapes Finance API — Wallets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/wallets
      name: wallets
      description: REST surface for wallets.
      operations:
      - method: GET
        name: get
        description: List wallets
        call: grapes-finance-wallets.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create wallet
        call: grapes-finance-wallets.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grapes-finance-wallets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Grapes Finance API — Wallets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-wallets
      description: List wallets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-finance-wallets.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-wallet
      description: Create wallet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: grapes-finance-wallets.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
