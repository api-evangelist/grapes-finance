naftiko: 1.0.0-alpha2
info:
  label: Grapes Finance API — Users
  description: 'Grapes Finance API — Users. 3 operations. Lead operation: List users. Self-contained Naftiko capability covering
    one Grapes Finance business surface.'
  tags:
  - Grapes Finance
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAPES_FINANCE_API_KEY: GRAPES_FINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: grapes-finance-users
    baseUri: https://api.demo.grapesfinance.com
    description: Grapes Finance API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: get
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: get
        method: GET
        description: Get user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.GRAPES_FINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: grapes-finance-users-rest
    port: 8080
    description: REST adapter for Grapes Finance API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: get
        description: List users
        call: grapes-finance-users.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create user
        call: grapes-finance-users.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: get
        description: Get user
        call: grapes-finance-users.get
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grapes-finance-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Grapes Finance API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-finance-users.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: grapes-finance-users.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-finance-users.get
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
